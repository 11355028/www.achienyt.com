<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿簽 YouTube 官方網站</title>
    <style>
        /* 網站基礎變數設定 */
        :root {
            --primary-color: #FF0055;    /* 鮮豔桃紅 */
            --secondary-color: #000000;  /* 黑色 */
            --light-blue: #80D4FF;       /* 第二段：淺藍 */
            --light-green: #85E085;      /* 第三段：淺綠 */
            --bg-white: #FFFFFF;         /* 第四段：白色 */
            --text-color: #000055;       
            --font-family: '王翰宗特黑體', '王漢宗特黑體', '微軟正黑體', 'Arial Black', sans-serif;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            color: var(--text-color);
            scroll-behavior: smooth;
        }

        /* 頂部導覽列 */
        nav {
            position: fixed;
            top: 20px;
            left: 5%;
            width: 90%;
            background-color: var(--bg-white);
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            box-sizing: border-box;
            z-index: 1000;
            border: 5px solid var(--secondary-color);
            box-shadow: 0 8px 0 var(--secondary-color);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 28px;
            font-weight: bold;
            color: var(--secondary-color);
            text-decoration: none;
        }

        .nav-logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            object-fit: cover;
            background-color: var(--light-blue);
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--secondary-color);
            font-weight: bold;
            font-size: 20px;
            padding: 12px 24px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            background-color: var(--primary-color);
            color: var(--bg-white);
            transform: translateY(-3px);
        }

        .sub-brand-btn {
            background-color: var(--primary-color);
            color: #FFF !important;
            border: 3px solid var(--primary-color);
        }

        .sub-brand-btn:hover {
            background-color: #FFF !important;
            color: var(--primary-color) !important;
        }

        /* 各區塊共用設定 */
        section {
            min-height: 100vh;
            padding: 120px 5% 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        h2 {
            font-size: 56px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* 第一段：封面區塊 (已替換為你提供的新圖床連結，並移除所有干擾圖面的設計) */
        #cover {
            background-image: url('blob:https://phototourl.com/04ffefae-c3b1-4f6e-8e99-e5ca385ff073');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 0; /* 讓圖片完整顯示，不需要內邊距 */
        }

        /* 第二段：熱門影片 (淺藍背景) */
        #hot-videos {
            background-color: var(--light-blue);
        }
        
        #hot-videos h2 {
            color: var(--secondary-color);
            text-shadow: 3px 3px 0px #FFF;
        }

        .video-container {
            width: 100%;
            max-width: 1400px;
            height: 75vh;
            border-radius: 40px;
            overflow: hidden;
            border: 10px solid var(--primary-color);
            background-color: var(--secondary-color);
            box-shadow: 0 15px 0 var(--secondary-color);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 第三段：特點、專業區塊 (淺綠背景) */
        #features {
            background-color: var(--light-green);
        }

        #features h2 {
            color: var(--secondary-color);
            text-shadow: 3px 3px 0px #FFF;
        }

        .feature-card {
            background-color: var(--bg-white);
            color: var(--text-color);
            padding: 60px;
            border-radius: 50px;
            font-size: 28px;
            line-height: 1.8;
            max-width: 900px;
            text-align: center;
            border: 8px solid var(--secondary-color);
            box-shadow: 0 15px 0 var(--secondary-color);
            font-weight: bold;
        }

        /* 第四段：訂閱區塊 (白色背景) */
        #subscribe {
            background-color: var(--bg-white);
        }

        #subscribe h2 {
            color: var(--secondary-color);
            text-shadow: 3px 3px 0px var(--light-blue);
        }

        .subscribe-btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: #FFF;
            font-size: 40px;
            font-weight: bold;
            text-decoration: none;
            padding: 25px 80px;
            border-radius: 60px;
            border: 8px solid var(--secondary-color);
            box-shadow: 0 12px 0 var(--secondary-color);
            transition: 0.2s;
        }

        .subscribe-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 17px 0 var(--secondary-color);
        }

        /* 底部版權聲明 */
        footer {
            background-color: var(--secondary-color);
            color: #FFF;
            text-align: center;
            padding: 40px;
            font-size: 20px;
            font-weight: bold;
        }

        @media (max-width: 1024px) {
            nav { flex-direction: column; gap: 15px; padding: 20px; border-radius: 30px; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            h2 { font-size: 40px; }
            .feature-card { font-size: 20px; padding: 30px; }
            .subscribe-btn { font-size: 28px; padding: 20px 40px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-logo">

            阿簽

        <div class="nav-links">

            <a href="https://youtube.com/@shanlaoban" target="_blank" class="sub-brand-btn">前往副頻道</a>

    <section id="cover">

        </div>
    </section>

    <section id="subscribe">
        <h2>準備好要學習了嗎？</h2>
        <a href="https://youtube.com/@achienyt/?sub_comfirmation=1" target="_blank" class="subscribe-btn">
            立即訂閱
        </a>
    </section>

    <footer>
        © 2026 Achien
    </footer>

</body>
</html>
